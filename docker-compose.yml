services:
  database:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/test:/docker-entrypoint-initdb.d 
    networks:
      - afisha_network

  backend:
    build: ./backend
    image: ghcr.io/${GITHUB_USERNAME}/afisha-backend:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      LOG_MODE: tskv
    ports:
      - "3000:3000"
    depends_on:
      - database
    volumes:
      - ./backend/public/content:/app/public/content
    networks:
      - afisha_network

  frontend:
    build: ./frontend
    image: ghcr.io/${GITHUB_USERNAME}/afisha-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - afisha_network

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - afisha_network

networks:
  afisha_network:
    driver: bridge

volumes:
  db_data: